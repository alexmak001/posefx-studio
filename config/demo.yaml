camera:
  device_id: 0
  width: 1280
  height: 720
  fps: 30

inference:
  pose_model: "yolov8n-pose.pt"
  seg_model: "yolov8n-seg.pt"
  device: "cpu"
  confidence_threshold: 0.5

effects:
  default: "neon_skeleton"

audio:
  enabled: true
  device_index: null
  sample_rate: 44100
  chunk_size: 1024
  bass_low_hz: 20
  bass_high_hz: 200
  smoothing_attack: 0.3
  smoothing_decay: 0.05
  sensitivity: 2.0        # multiplier on bass energy (higher = more reactive)
  noise_gate: 2000.0       # bass magnitude below this is treated as silence

debug:
  show_skeleton: true
  show_mask: true
  show_fps: true
  show_keypoint_confidence: true
