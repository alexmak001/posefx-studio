camera:
  device_id: 0
  width: 1280
  height: 720
  fps: 30

inference:
  pose_model: "yolov8n-pose.pt"
  seg_model: "yolov8n-seg.pt"
  device: "cpu"
  confidence_threshold: 0.5
  inference_scale: 0.5            # downscale factor for inference (0.5 = half res, faster)

effects:
  default: "neon_wireframe"

audio:
  enabled: true
  device_index: null
  sample_rate: 44100
  chunk_size: 1024
  bass_low_hz: 20
  bass_high_hz: 200
  smoothing_attack: 0.3
  smoothing_decay: 0.05
  sensitivity: 2.0        # multiplier on bass energy (higher = more reactive)
  noise_gate: 2000.0       # bass magnitude below this is treated as silence

capture:
  photo_dir: "data/photos"
  recording_dir: "data/recordings"
  edited_subdir: "edited"
  raw_subdir: "raw"
  photo_mode: "both"       # raw, edited, or both
  record_mode: "both"      # raw, edited, or both
  photo_quality: 95
  auto_capture_interval: 15
  countdown_seconds: 3

web:
  enabled: true
  host: "0.0.0.0"
  port: 8000
  stream_quality: 60         # JPEG quality for MJPEG stream (lower = less bandwidth)
  stream_max_fps: 15         # cap stream FPS to save bandwidth
  qr_visible_on_startup: true

youtube:
  enabled: true
  max_search_results: 10
  max_duration_seconds: 0

ai:
  enabled: true
  results_dir: "data/ai_results"
  uploads_dir: "data/uploads"
  max_upload_size_mb: 50
  replicate_model_face_swap: "lucataco/faceswap"
  replicate_model_video_swap: "xiankgx/face-swap"
  replicate_model_edit: "black-forest-labs/flux-kontext-pro"
  replicate_model_video_gen: "minimax/video-01-live"

debug:
  show_skeleton: true
  show_mask: true
  show_fps: true
  show_keypoint_confidence: true
